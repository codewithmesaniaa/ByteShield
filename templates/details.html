<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Detailed Comparison</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

/* ---------- BODY ---------- */
body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'JetBrains Mono', monospace;
    margin: 0;
}

/* ---------- HEADER ---------- */
h2 {
    text-align: center;
    padding: 15px;
    background: #1e293b;
    margin: 0;
    font-weight: 500;
    letter-spacing: 0.5px;
}

/* ---------- BACK BUTTON ---------- */
.back-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    background: #2563eb;
    border: none;
    color: white;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 13px;
    transition: 0.2s;
}

.back-btn:hover {
    background: #1d4ed8;
}

/* ---------- CONTAINER ---------- */
.comparison-container {
    display: flex;
    height: 92vh;
}

/* ---------- COLUMN ---------- */
.code-box {
    width: 50%;
    overflow-y: auto;
    border-right: 1px solid #1e293b;
    padding: 10px 0;
}

/* ---------- COLUMN HEADER ---------- */
.code-header {
    position: sticky;
    top: 0;
    background: #1e293b;
    padding: 10px;
    text-align: center;
    font-weight: 500;
    z-index: 10;
}

/* ---------- LINE ---------- */
.line {
    display: flex;
    padding: 4px 8px;
}

/* ---------- LINE NUMBER ---------- */
.line-number {
    width: 45px;
    color: #64748b;
    text-align: right;
    padding-right: 10px;
    font-size: 13px;
}

/* ---------- CODE TEXT ---------- */
.code-text {
    flex: 1;
    white-space: pre-wrap;
    font-size: 15px;
    line-height: 1.7;
    letter-spacing: 0.3px;
}

/* ---------- DIFF HIGHLIGHT ---------- */
.diff {
    background: rgba(34, 197, 94, 0.22);  /* soft green */
    color: #bbf7d0;
    padding: 2px 5px;
    border-radius: 4px;
}

/* ---------- SCROLLBAR (optional polish) ---------- */
.code-box::-webkit-scrollbar {
    width: 6px;
}

.code-box::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 10px;
}

</style>
</head>

<body>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<h2>Code Comparison</h2>

<div class="comparison-container">

    <div class="code-box" id="file1-box">
        <div class="code-header">File 1</div>
    </div>

    <div class="code-box" id="file2-box">
        <div class="code-header">File 2</div>
    </div>

</div>

<script>

const data = JSON.parse(localStorage.getItem("comparisonData"));

const file1Box = document.getElementById("file1-box");
const file2Box = document.getElementById("file2-box");

/* ---------- RENDER LINES ---------- */
data.line_matches.forEach((item, index) => {

    // LEFT
    const line1 = document.createElement("div");
    line1.className = "line";
    line1.innerHTML = `
        <span class="line-number">${index + 1}</span>
        <span class="code-text">${item.line1}</span>
    `;
    file1Box.appendChild(line1);

    // RIGHT
    const line2 = document.createElement("div");
    line2.className = "line";
    line2.innerHTML = `
        <span class="line-number">${index + 1}</span>
        <span class="code-text">${item.line2}</span>
    `;
    file2Box.appendChild(line2);

});

/* ---------- SCROLL SYNC ---------- */
file1Box.addEventListener("scroll", () => {
    file2Box.scrollTop = file1Box.scrollTop;
});
file2Box.addEventListener("scroll", () => {
    file1Box.scrollTop = file2Box.scrollTop;
});

/* ---------- BACK ---------- */
function goBack() {
    window.history.back();
}

</script>

</body>
</html>
